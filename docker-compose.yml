version: '3.9'

services:
  postgres:
    image: postgres:14
    container_name: pg-mastery
    environment:
      - POSTGRES_DB=mastery
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: